media:
  input: images
  output: /images

content:
  - name: einstellungen
    label: Einstellungen (Menü & Shop)
    type: file
    path: content/settings.json
    fields:
      - { name: shop_url, label: "Shop-Adresse (Link für „Shop“)", type: string }
      - { name: nav_galerie, label: "Menü-Name: Galerie", type: string }
      - { name: nav_ueber, label: "Menü-Name: Über", type: string }
      - { name: nav_kontakt, label: "Menü-Name: Kontakt", type: string }
      - { name: nav_library, label: "Menü-Name: Library", type: string }
      - { name: nav_shop, label: "Menü-Name: Shop", type: string }
      - { name: impressum_url, label: "Impressum-Link (Footer)", type: string }
      - { name: datenschutz_url, label: "Datenschutz-Link (Footer)", type: string }
      - { name: agb_url, label: "AGB-Link (Footer)", type: string }

  - name: library
    label: The Queen's Library (Artikel)
    type: collection
    path: content/library
    filename: '{fields.title}.md'
    view:
      fields: [title, date]
    fields:
      - { name: title, label: "Titel", type: string }
      - { name: date, label: "Datum", type: date }
      - { name: excerpt, label: "Kurzbeschreibung", type: text }
      - { name: cover, label: "Titelbild", type: image }
      - { name: body, label: "Inhalt", type: rich-text }

  - name: index
    label: Startseite
    type: file
    path: content/index.json
    fields:
      - { name: hero_heading, label: "Hero-Überschrift (Zeilenumbruch mit <br>)", type: string }
      - { name: hero_image, label: "Hero-Bild (großes Bild oben)", type: image }
      - { name: section_heading, label: "Abschnitts-Überschrift (mit <br>)", type: string }
      - { name: home_para, label: "Einleitungstext", type: text }
      - { name: get_in_touch, label: "Button-Text", type: string }
      - { name: branding_heading, label: "Überschrift über den 3 Karten", type: string }
      - { name: branding_sub, label: "Unterzeile (gold)", type: string }
      - { name: img_emotional, label: "Karte 1 – Bild (führt zur Galerie)", type: image }
      - { name: img_about, label: "Karte 2 – Bild (führt zu Über)", type: image }
      - { name: img_contact, label: "Karte 3 – Bild (führt zu Kontakt)", type: image }

  - name: about
    label: Über
    type: file
    path: content/about.json
    fields:
      - { name: hero_heading, label: "Hero-Überschrift", type: string }
      - { name: image_one, label: "Bild 1 (oben)", type: image }
      - { name: image_two, label: "Bild 2 (Portrait)", type: image }
      - { name: modern_heading, label: "Überschrift 1", type: string }
      - { name: effect_para_1, label: "Text 1", type: text }
      - { name: effect_para_2, label: "Text 2", type: text }
      - { name: colors_heading, label: "Material-Überschrift", type: string }
      - { name: color_para, label: "Material-Text", type: text }
      - { name: agency_heading, label: "Begleitung-Überschrift", type: string }
      - { name: agency_para, label: "Begleitung-Text", type: text }
      - { name: get_in_touch, label: "Button-Text", type: string }

  - name: gallery
    label: Galerie
    type: file
    path: content/gallery.json
    fields:
      - { name: hero_heading, label: "Hero-Überschrift", type: string }
      - { name: branding_sub, label: "Unterzeile", type: string }
      - { name: gal_portrait, label: "Galerie – Portrait", type: image }
      - { name: gal_moodboard, label: "Galerie – Moodboard", type: image }
      - { name: gal_landscape, label: "Galerie – Querformat", type: image }
      - { name: gal_row1, label: "Galerie – Bild Reihe 1", type: image }
      - { name: gal_row2, label: "Galerie – Bild Reihe 2", type: image }
      - { name: gal_row3, label: "Galerie – Bild Reihe 3", type: image }
      - { name: gal_row4, label: "Galerie – Bild Reihe 4", type: image }
      - { name: gal_row5, label: "Galerie – Bild Reihe 5", type: image }

  - name: contact
    label: Kontakt
    type: file
    path: content/contact.json
    fields:
      - { name: hero_heading, label: "Hero-Überschrift (mit <br>)", type: string }
      - { name: exovia_heading, label: "Überschrift", type: string }
      - { name: direct_label, label: "Label „Direkt“", type: string }
      - { name: general_label, label: "Label „Allgemein“", type: string }
      - { name: address, label: "Adresse (Zeilenumbruch mit <br>)", type: string }
      - { name: agency_heading, label: "Shop-Hinweis Überschrift", type: string }
      - { name: agency_para, label: "Shop-Hinweis Text", type: text }
      - { name: get_in_touch, label: "Button-Text", type: string }
